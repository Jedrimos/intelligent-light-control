set_zone_mode:
  name: Zonenmodus setzen
  description: Setzt den Betriebsmodus einer Zone.
  fields:
    zone_id:
      name: Zonen-ID
      required: true
      example: "wohnzimmer"
      selector:
        text:
    mode:
      name: Modus
      description: "auto = Bewegungssteuerung, manual = manuell, off = deaktiviert"
      required: true
      selector:
        select:
          options:
            - "auto"
            - "manual"
            - "off"

turn_on_zone:
  name: Zone einschalten
  description: Schaltet die Lichter einer Zone ein (wechselt in manuellen Modus).
  fields:
    zone_id:
      name: Zonen-ID
      required: true
      selector:
        text:

turn_off_zone:
  name: Zone ausschalten
  description: Schaltet die Lichter einer Zone aus (wechselt in manuellen Modus).
  fields:
    zone_id:
      name: Zonen-ID
      required: true
      selector:
        text:

toggle_zone:
  name: Zone umschalten
  description: Schaltet die Lichter einer Zone um.
  fields:
    zone_id:
      name: Zonen-ID
      required: true
      selector:
        text:

activate_scene:
  name: Szene aktivieren
  description: Aktiviert eine bestimmte Szene in einer Zone (wechselt in manuellen Modus).
  fields:
    zone_id:
      name: Zonen-ID
      required: true
      selector:
        text:
    scene_id:
      name: Szenen-ID
      required: true
      example: "scene.wohnzimmer_film"
      selector:
        entity:
          domain: scene

set_system_mode:
  name: Systemmodus setzen
  description: Setzt den globalen Betriebsmodus der gesamten Integration.
  fields:
    mode:
      name: Modus
      required: true
      selector:
        select:
          options:
            - "auto"
            - "manual"
            - "off"

reload:
  name: Neu laden
  description: Lädt die Integration neu.

export_config:
  name: Konfiguration exportieren
  description: Exportiert die aktuelle Konfiguration aller Zonen als persistent_notification.
